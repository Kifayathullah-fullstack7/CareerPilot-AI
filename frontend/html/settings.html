<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | CareerPilot AI</title>
    <link rel="stylesheet" href="../css/style.css?v=1.6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .settings-section {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 1.5rem;
        }
        .settings-section h3 {
            margin-bottom: 1rem;
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }
        .small {
            font-size: 13px;
        }
        .text-danger {
            color: var(--danger);
        }
        /* Simple Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-card">
            <div class="logo">
                <i class="fas fa-paper-plane"></i>
                CareerPilot
            </div>
            <nav class="side-nav">
                <a href="dashboard.html">
                    <i class="fas fa-th-large"></i>
                    Dashboard
                </a>
                <a href="upload.html">
                    <i class="fas fa-cloud-upload-alt"></i>
                    Upload Resume
                </a>
                <a href="history.html">
                    <i class="fas fa-history"></i>
                    History
                </a>
                <a href="profile.html">
                    <i class="fas fa-user"></i>
                    Profile
                </a>
                <a href="settings.html" class="active">
                    <i class="fas fa-cog"></i>
                    Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-outline btn-block" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
                <h2>Settings</h2>
                
                <div class="settings-section mt-2">
                    <h3>Notifications</h3>
                    <div class="setting-item">
                        <div>
                            <p>Email Notifications</p>
                            <span class="small text-muted">Get updates about new job matches</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-section mt-2">
                    <h3>Display</h3>
                    <div class="setting-item">
                        <div>
                            <p>Dark Mode</p>
                            <span class="small text-muted">Toggle the dark/light theme</span>
                        </div>
                        <label class="switch">
                            <input type="checkbox" checked disabled>
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-section mt-2 danger-zone" style="border:none;">
                    <h3 class="text-danger">Danger Zone</h3>
                    <div class="setting-item">
                        <p>Delete Account</p>
                        <button class="btn btn-outline text-danger" style="border-color: var(--danger); padding: 6px 12px; font-size:14px; height:auto;" onclick="alert('Account deletion is disabled for demo.')">Delete</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="../js/main.js?v=1.9"></script>
</body>
</html>
