<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CareerPilot AI</title>
    <link rel="stylesheet" href="css/style.css?v=1.7">
    <link rel="stylesheet" href="css/login.css?v=1.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="text-center mb-2">
                <a href="index.html" class="logo mb-1 d-block"><i class="fas fa-paper-plane"></i> CareerPilot</a>
                <h2>Welcome Back</h2>
                <p class="text-muted">Enter your credentials to access your dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <div class="flex-between">
                        <label>Password</label>
                        <a href="#" class="small-link">Forgot?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-check">
                    <input type="checkbox" id="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <div class="social-login">
                <button type="button" class="btn btn-outline btn-block" onclick="loginWithGoogle()"><i class="fab fa-google" style="color: #4285F4; margin-right: 8px;"></i> Google</button>
            </div>

            <p class="text-center mt-2">
                Don't have an account? <a href="register.html" class="link">Create Account</a>
            </p>
        </div>
    </div>
  <script src="js/main.js?v=1.8"></script>
    <script src="js/login.js?v=1.8"></script>
</body>
</html>
